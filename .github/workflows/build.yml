name: Build Lynx-LSP (Windows)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Lynx-LSP
        run: |
          gcc -Wall -Wextra -O2 -Isrc src/*.c -o lynx-lsp.exe -lm

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: lynx-lsp-windows
          path: lynx-lsp.exe